server:
  port: 8080

spring:
  application:
    name: tracko-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tracko_db}
    username: ${DATABASE_USERNAME:tracko}
    password: ${DATABASE_PASSWORD:tracko}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

logging:
  level:
    com.pgsc.tracko: INFO
    org.hibernate.SQL: WARN
